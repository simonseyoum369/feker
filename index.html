<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የፍቅራችን ጋላክሲ - መልካም ልደት</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Pinyon+Script&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans Ethiopic', 'Inter', sans-serif;
            background-color: #050002;
        }
        .font-serif-lux { font-family: 'Playfair Display', 'Noto Sans Ethiopic', serif; }
        .font-script { font-family: 'Pinyon Script', cursive; }
        .font-amharic { font-family: 'Noto Sans Ethiopic', sans-serif; }
        
        @keyframes orbit { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse-slow { 0%, 100% { transform: scale(1); opacity: 0.9; } 50% { transform: scale(1.05); opacity: 1; filter: drop-shadow(0 0 25px rgba(244,63,94,0.6)); } }
        @keyframes reverse-orbit { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
        @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes float-up { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-100px) scale(0.5); opacity: 0; } }

        .animate-galaxy-spin { animation: orbit 45s linear infinite; }
        .animate-heart-pulse { animation: pulse-slow 4s ease-in-out infinite; }
        .counter-rotate { animation: reverse-orbit 45s linear infinite; }
        .animate-spin-slow { animation: spin-slow 12s linear infinite; }
        .animate-float-up { animation: float-up 2s ease-out forwards; }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 antialiased overflow-x-hidden selection:bg-rose-900 selection:text-rose-100">

    <div x-data="birthdayApp()" 
         class="relative w-full max-w-md h-[840px] rounded-[40px] shadow-2xl overflow-hidden border border-rose-950/40 bg-black text-neutral-100"
         style="box-shadow: 0 25px 70px -10px rgba(0, 0, 0, 0.9), inset 0 1px 0 1px rgba(255,255,255,0.05);">
        
        <audio x-ref="bgMusic" loop preload="auto" src="birthday-bgm.mp3"></audio>

        <!-- Envelope Page -->
        <div x-show="currentPage === 'envelope'" 
             x-transition:leave="transition ease-in duration-700 transform"
             x-transition:leave-start="opacity-100 scale-100"
             x-transition:leave-end="opacity-0 scale-95"
             class="absolute inset-0 flex flex-col items-center justify-between p-8 bg-gradient-to-b from-[#240307] via-[#0d0103] to-black z-50">
            
            <div class="text-center mt-12 space-y-2">
                <span class="text-xs tracking-[0.3em] text-rose-400/70 font-medium uppercase font-amharic">መልእክት ደርሷል</span>
                <h1 class="text-3xl font-serif-lux font-semibold text-neutral-100 tracking-wide font-amharic">የፍቅር ጋላክሲ</h1>
            </div>

            <div class="relative w-full aspect-[4/3] flex items-center justify-center group cursor-pointer my-auto"
                 @click="openCard()">
                <div class="absolute w-56 h-56 bg-rose-500/10 blur-3xl rounded-full group-hover:bg-rose-500/20 transition duration-700"></div>
                
                <div class="relative w-72 h-48 bg-gradient-to-br from-neutral-900 to-neutral-950 rounded-2xl shadow-2xl flex items-center justify-center border border-white/10 transform group-hover:scale-[1.02] transition duration-500">
                    <div class="absolute inset-0 opacity-5 bg-[radial-gradient(#fff_1px,transparent_1px)] [background-size:12px_12px]"></div>
                    <div class="absolute top-0 inset-x-0 h-24 border-b border-black/40 bg-gradient-to-b from-neutral-850 to-neutral-900 rounded-t-2xl" style="clip-path: polygon(0 0, 100% 0, 50% 100%);"></div>

                    <div class="absolute z-10 flex flex-col items-center justify-center transform group-hover:scale-110 transition duration-300">
                        <div class="w-16 h-16 rounded-full bg-gradient-to-br from-rose-500 via-rose-600 to-rose-800 shadow-[0_4px_25px_rgba(225,29,72,0.45)] flex items-center justify-center border border-rose-400/30 ring-4 ring-rose-950">
                            <span class="text-xl">❤️</span>
                        </div>
                    </div>
                </div>
            </div>

            <p class="text-[11px] text-neutral-500 tracking-widest uppercase mb-6 animate-pulse font-amharic">ልቡን በመጫን ወደ አለምህ ግባ</p>
        </div>

        <!-- Main Content Area -->
        <div x-show="currentPage !== 'envelope'" 
             x-transition:enter="transition ease-out duration-700 delay-300"
             class="absolute inset-0 flex flex-col justify-between overflow-hidden">
            
            <header class="p-6 flex items-center justify-between border-b border-white/5 bg-gradient-to-b from-black via-black/80 to-transparent z-30">
                <div>
                    <h2 class="font-serif-lux text-base text-rose-100 tracking-wide font-amharic" x-text="getHubTitle()"></h2>
                    <p class="text-[9px] text-rose-400/60 uppercase tracking-widest mt-0.5 font-amharic" x-text="getSubtitle()"></p>
                </div>
                <button @click="toggleAudio()" class="w-9 h-9 rounded-full bg-white/5 border border-white/10 flex items-center justify-center text-neutral-300 hover:text-white transition">
                    <template x-if="audioPlaying">
                        <svg class="w-4 h-4 animate-spin-slow" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"/></svg>
                    </template>
                    <template x-if="!audioPlaying">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17.25 9.75L19.5 12m0 0l2.25 2.25M19.5 12l2.25-2.25M19.5 12l-2.25 2.25m-10.5-6L4.5 9H1.5v6h3l4.5 3.75V5.25z"/></svg>
                    </template>
                </button>
            </header>

            <main class="flex-1 relative flex flex-col justify-center items-center">
                
                <!-- Hub Page -->
                <div x-show="currentPage === 'hub'" x-transition class="w-full text-center px-6 space-y-6">
                    <div class="relative w-32 h-32 mx-auto rounded-full p-1 bg-gradient-to-tr from-rose-500 via-purple-600 to-amber-500 shadow-xl">
                        <img :src="getPhotoUrl('hub-avatar.jpg')" alt="እኛ" class="w-full h-full object-cover rounded-full border-2 border-black" onerror="this.src='https://images.unsplash.com/photo-1518199266791-5375a83190b7?auto=format&fit=crop&q=80&w=400'">
                    </div>
                    <div class="space-y-2">
                        <h3 class="text-2xl font-serif-lux text-neutral-100 font-amharic">መልካም ልደት ፍቅሬ!</h3>
                        <p class="text-xs text-neutral-400 max-w-xs mx-auto leading-relaxed font-amharic">ወደ ኮስሞስ ሂጂና በከዋክብት ላይ ነክተሽ የማይረሱ ትዝታዎችን ተመልከቺ።</p>
                    </div>
                    <button @click="switchPage('galaxy')" class="px-6 py-2.5 rounded-full bg-rose-600 hover:bg-rose-700 text-white font-medium text-xs tracking-wider uppercase transition shadow-lg shadow-rose-950/50 font-amharic">
                        ወደ ፍቅር ጋላክሲ ግቢ ✨
                    </button>
                </div>

                <!-- Galaxy Page -->
                <div x-show="currentPage === 'galaxy'" class="absolute inset-0 flex items-center justify-center overflow-hidden bg-radial-[at_center,_var(--tw-gradient-stops)] from-[#120005] via-black to-black">
                    
                    <div class="absolute inset-0 pointer-events-none opacity-40 bg-[url('https://www.transparenttextures.com/patterns/stardust.png')]"></div>
                    <div id="heartsContainer" class="absolute inset-0 pointer-events-none z-10"></div>
                    
                    <div class="relative w-[560px] h-[560px] flex items-center justify-center animate-galaxy-spin transform scale-85 mobile:scale-100">
                        
                        <div class="absolute w-44 h-44 rounded-full bg-purple-600/10 blur-3xl"></div>
                        <div class="absolute w-72 h-72 rounded-full bg-rose-600/5 blur-3xl rotate-45"></div>

                        <div class="absolute z-20 flex items-center justify-center counter-rotate">
                            <div class="relative w-20 h-20 flex items-center justify-center animate-heart-pulse cursor-pointer" @click="openGalaxyNode('core')">
                                <svg class="w-16 h-16 text-rose-500 filter drop-shadow-[0_0_15px_rgba(244,63,94,0.8)]" fill="currentColor" viewBox="0 0 24 24">
                                    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                                </svg>
                                <div class="absolute text-[8px] text-white font-semibold font-amharic mt-0.5">እኛ</div>
                            </div>
                        </div>

                        <template x-for="(tag, index) in galaxyTags" :key="index">
                            <div class="absolute text-[10px] text-rose-200/80 font-medium tracking-widest uppercase whitespace-nowrap cursor-pointer hover:text-white hover:scale-110 transition duration-300"
                                 :style="`transform: rotate(${index * (360 / galaxyTags.length)}deg) translate(${115 + (index % 2 * 35)}px) rotate(-${index * (360 / galaxyTags.length)}deg);`"
                                 @click="openGalaxyNode(tag.type)">
                                <div class="flex flex-col items-center space-y-1 counter-rotate">
                                    <span class="bg-black/40 px-2 py-0.5 rounded-full border border-rose-500/10 backdrop-blur-xs font-amharic" x-text="tag.text"></span>
                                    <span class="text-xs" x-text="tag.icon"></span>
                                </div>
                            </div>
                        </template>
                    </div>

                    <div class="absolute bottom-4 text-center pointer-events-none z-10">
                        <p class="text-[10px] text-rose-300/40 uppercase tracking-widest animate-pulse font-amharic">🌌 ከዋክብትን ንኪና ፎቶዎችን ተመልከቺ</p>
                    </div>

                    <!-- Galaxy Overlay with Carousel -->
                    <div x-show="galaxyOverlayActive"
                         x-transition:enter="transition ease-out duration-400"
                         x-transition:enter-start="opacity-0 scale-95"
                         x-transition:enter-end="opacity-100 scale-100"
                         x-transition:leave="transition ease-in duration-300"
                         x-transition:leave-start="opacity-100 scale-100"
                         x-transition:leave-end="opacity-0 scale-95"
                         class="absolute inset-x-6 top-1/2 -translate-y-1/2 max-w-xs mx-auto bg-neutral-950/95 border border-rose-900/40 p-6 rounded-3xl shadow-2xl backdrop-blur-md z-40 text-center space-y-4">
                        
                        <div class="w-12 h-12 rounded-full bg-rose-950/60 border border-rose-500/30 flex items-center justify-center text-xl mx-auto" x-text="activeNodeData.icon"></div>
                        
                        <div class="space-y-1">
                            <h4 class="font-serif-lux text-lg text-amber-100 font-amharic" x-text="activeNodeData.title"></h4>
                            <p class="text-[10px] text-rose-400 uppercase tracking-widest font-amharic" x-text="activeNodeData.subtitle"></p>
                        </div>
                        
                        <p class="text-xs text-neutral-300 leading-relaxed font-amharic" x-text="activeNodeData.description"></p>
                        
                        <div class="relative">
                            <div class="flex overflow-x-auto hide-scrollbar space-x-2 rounded-lg" x-ref="carouselScroll">
                                <template x-for="(img, idx) in activeNodeData.images" :key="idx">
                                    <div class="flex-none w-full max-w-[200px] aspect-[4/5] rounded-lg overflow-hidden border border-white/10 bg-neutral-900">
                                        <img :src="getPhotoUrl(img)" class="w-full h-full object-cover" loading="lazy" onerror="this.parentElement.style.display='none'">
                                    </div>
                                </template>
                            </div>
                            <button x-show="activeNodeData.images.length > 1" 
                                    @click="scrollCarousel(-200)" 
                                    class="absolute left-0 top-1/2 -translate-y-1/2 bg-black/70 hover:bg-black/90 rounded-full p-1 text-white">‹</button>
                            <button x-show="activeNodeData.images.length > 1" 
                                    @click="scrollCarousel(200)" 
                                    class="absolute right-0 top-1/2 -translate-y-1/2 bg-black/70 hover:bg-black/90 rounded-full p-1 text-white">›</button>
                        </div>

                        <button @click="galaxyOverlayActive = false" class="w-full py-2 rounded-xl bg-white/5 hover:bg-white/10 border border-white/10 text-xs font-medium tracking-wide transition font-amharic">
                            ወደ ዩኒቨርስ ተመለስ
                        </button>
                    </div>
                </div>

                <!-- Message/Letter Page -->
                <div x-show="currentPage === 'message'" class="absolute inset-0 flex flex-col items-center justify-center p-4 z-10 overflow-hidden">
                    <div class="absolute inset-0 bg-neutral-950/85 transition-all duration-1000 backdrop-blur-xs"></div>
                    
                    <div x-show="currentPage === 'message' && letterVisible"
                         x-transition:enter="transition ease-out duration-700 transform"
                         x-transition:enter-start="opacity-0 scale-90 translate-y-4"
                         x-transition:enter-end="opacity-100 scale-100 translate-y-0"
                         class="relative w-full max-w-xs aspect-[3/4] bg-[radial-gradient(#fbfaf0_1px,transparent_1px)] [background-size:16px_16px] bg-[#f9f6e5] text-neutral-900 rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.6)] p-6 flex flex-col justify-between border border-amber-100/50 overflow-hidden">
                        
                        <div class="absolute inset-0 opacity-25 pointer-events-none mix-blend-multiply bg-[url('https://www.transparenttextures.com/patterns/parchment.png')]"></div>

                        <div class="relative z-10 flex-1 flex flex-col justify-start pt-2">
                            <p class="text-sm md:text-base font-serif-lux italic text-amber-950 leading-relaxed tracking-wide whitespace-pre-wrap select-none font-amharic" x-text="typedText"></p>
                        </div>

                        <div x-show="photoVisible"
                             x-transition:enter="transition ease-out duration-1000 transform"
                             x-transition:enter-start="opacity-0 scale-75 translate-x-8 translate-y-8 rotate-6"
                             x-transition:enter-end="opacity-100 scale-100 translate-x-0 translate-y-0 rotate-[-4deg]"
                             class="absolute bottom-4 right-4 w-28 bg-white p-1.5 shadow-lg border border-neutral-200/60 transform rotate-[-4deg] z-20">
                            <div class="w-full aspect-square bg-neutral-100 overflow-hidden mb-2">
                                <img :src="getPhotoUrl('message-photo.jpg')" alt="እኛ" class="w-full h-full object-cover grayscale-[15%] contrast-[105%]" onerror="this.src='https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2?auto=format&fit=crop&q=80&w=300'">
                            </div>
                            <div class="text-center">
                                <span class="font-script text-lg text-neutral-800 leading-none font-amharic">አብረን x</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Cake/Music Page -->
                <div x-show="currentPage === 'cake'" x-transition class="space-y-6 text-center max-w-xs mx-auto">
                    <div class="relative w-44 h-44 mx-auto flex items-center justify-center">
                        <div class="absolute inset-0 rounded-full bg-neutral-900 border-4 border-neutral-800 shadow-2xl flex items-center justify-center"
                             :class="audioPlaying ? 'animate-spin-slow' : ''">
                            <div class="absolute inset-2 rounded-full border border-dashed border-neutral-700/60"></div>
                            <div class="absolute inset-6 rounded-full border border-neutral-800"></div>
                            <div class="absolute inset-10 rounded-full border border-dashed border-neutral-700/40"></div>
                            <div class="w-14 h-14 rounded-full bg-rose-900 border-2 border-amber-400/40 flex items-center justify-center overflow-hidden">
                                <div class="w-3 h-3 rounded-full bg-black"></div>
                            </div>
                        </div>
                        <div class="absolute top-0 right-2 w-10 h-20 origin-top transform transition duration-700 pointer-events-none"
                             :class="audioPlaying ? 'rotate-[15deg]' : 'rotate-0'">
                            <div class="w-1 h-14 bg-neutral-400 ml-4 shadow-sm"></div>
                            <div class="w-3 h-3 bg-neutral-600 rounded-xs -mt-1 ml-3"></div>
                        </div>
                    </div>

                    <div class="space-y-1">
                        <h4 class="font-serif-lux text-lg text-amber-100 font-amharic">የኛ ልዩ ዘፈን</h4>
                        <p class="text-[11px] text-neutral-400 tracking-widest uppercase font-amharic">አሁን የልደት ዜማሽን እያጫወትኩ ነው</p>
                    </div>

                    <div class="bg-white/5 p-3 rounded-xl border border-white/5 flex items-center justify-between text-left">
                        <div class="flex items-center space-x-3">
                            <span class="text-2xl">🎂</span>
                            <div>
                                <h5 class="text-xs font-semibold text-neutral-200 font-amharic">ምኞትሽን ለብቻሽ ጠይቂ</h5>
                                <p class="text-[10px] text-neutral-400 font-amharic">ሻማውን ለማጥፋት ዝግጁ ስትሆኚ</p>
                            </div>
                        </div>
                        <button @click="blowCandles()" class="px-3 py-1.5 rounded-lg bg-rose-600 hover:bg-rose-700 text-white text-[11px] font-medium transition shadow-md font-amharic">
                            አጥፊ
                        </button>
                    </div>
                </div>

            </main>

            <footer class="p-4 bg-gradient-to-t from-black via-neutral-950 to-transparent border-t border-white/5 z-20">
                <nav class="flex items-center justify-around max-w-sm mx-auto">
                    <button @click="switchPage('hub')" 
                            class="flex flex-col items-center space-y-1 p-2 transition"
                            :class="currentPage === 'hub' ? 'text-rose-400' : 'text-neutral-400 hover:text-neutral-200'">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" /></svg>
                        <span class="text-[9px] tracking-wider uppercase font-amharic">መነሻ</span>
                    </button>

                    <button @click="switchPage('galaxy')" 
                            class="flex flex-col items-center space-y-1 p-2 transition"
                            :class="currentPage === 'galaxy' ? 'text-rose-400' : 'text-neutral-400 hover:text-neutral-200'">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m6.364.364l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
                        <span class="text-[9px] tracking-wider uppercase font-amharic">ኮስሞስ</span>
                    </button>

                    <button @click="switchPage('message')" 
                            class="flex flex-col items-center space-y-1 p-2 transition"
                            :class="currentPage === 'message' ? 'text-rose-400' : 'text-neutral-400 hover:text-neutral-200'">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 7.5h1.5m-1.5 3h1.5m-7.5 3h10.5m-10.5 3h10.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" /></svg>
                        <span class="text-[9px] tracking-wider uppercase font-amharic">ደብዳቤ</span>
                    </button>

                    <button @click="switchPage('cake')" 
                            class="flex flex-col items-center space-y-1 p-2 transition"
                            :class="currentPage === 'cake' ? 'text-rose-400' : 'text-neutral-400 hover:text-neutral-200'">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 9l10.5-3m0 0v13.5m0-13.5L9 12m0 0v7.5M12 9h.008v.008H12V9zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm-.375 5.25h.008v.008H12v-.008zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z" /></svg>
                        <span class="text-[9px] tracking-wider uppercase font-amharic">ዜማ</span>
                    </button>
                </nav>
            </footer>
        </div>
    </div>

    <script>
        function birthdayApp() {
            // ========== ALL YOUR GOOGLE DRIVE FILE IDS ==========
            const photoMap = {
                // Main profile photos (using us together 15 & 21 - change if you prefer others)
                "hub-avatar.jpg": "1CRHmBIqNTCwk-xYtBTEB2gDd2Il70waf",
                "message-photo.jpg": "1CeYMNnGtcMPtO9lM2seyTFAhY9mXWkYm",
                // Us together
                "us together.jpg": "1NPjGfv-fOjJmLsLRMJsnHQc2U5DSMRxn",
                "us together 2.jpg": "1_vndZ0eNGfmr8DZ52fXyjeTp6obEo59C",
                "us together 3.jpg": "1OBQ0byXeMvZCwU01GEOOFIzYy8gTqOhY",
                "us together 5.jpg": "1QvAEYM-WbyP5lVRGbYHnu6absddrTSnF",
                "us together 11.jpg": "13K4JOCJxYbkUikylVlnewGwbrekp_2JP",
                "us together 12.jpg": "1xI7XyVcZK55Ui9zBNNa-aD_WPaGPqU--",

                    return subs[this.currentPage] || '';

                openGalaxyNode(nodeKey) {
                    this.activeNodeData = this.nodeRegistry[nodeKey] || this.nodeRegistry['core'];
                    this.galaxyOverlayActive = true;
                    this.$nextTick(() => {
                        if (this.$refs.carouselScroll) this.$refs.carouselScroll.scrollLeft = 0;
                    });
                },

                    if (this.$refs.carouselScroll) this.$refs.carouselScroll.scrollBy({ left: offset, behavior: 'smooth' });
                },
                spawnHearts() {
                    const container = document.getElementById('heartsContainer');
                    if (!container) return;
                    for (let i = 0; i < 8; i++) {
                        setTimeout(() => {
                            const heart = document.createElement('div');
                            heart.className = 'absolute text-rose-400 pointer-events-none animate-float-up';
                            heart.style.left = Math.random() * 80 + 10 + '%';
                            heart.style.top = Math.random() * 60 + 40 + '%';
                            heart.style.fontSize = (Math.random() * 16 + 12) + 'px';
                            heart.innerHTML = ['❤️', '💕', '💖', '✨', '💫'][Math.floor(Math.random() * 5)];
                            container.appendChild(heart);
                            setTimeout(() => heart.remove(), 2000);
                        }, i * 80);
                    }
                },

                    this.spawnHearts();

                switchPage(pageName) {
                    this.currentPage = pageName;
                    this.galaxyOverlayActive = false;
                    if (this.typingTimer) {
                        clearTimeout(this.typingTimer);
                        this.typingTimer = null;
                    }
                    if (pageName === 'message') {
                        this.letterVisible = false;
                        this.photoVisible = false;
                        this.typedText = '';
                        setTimeout(() => {
                            this.letterVisible = true;
                            this.startTypewriter();
                        }, 400);
                    } else {
                        this.letterVisible = false;
                        this.photoVisible = false;
                        this.typedText = '';
                    }
                },
                startTypewriter() {
                    let index = 0;
                    const type = () => {
                        if (index < this.fullMessage.length && this.currentPage === 'message') {
                            this.typedText += this.fullMessage.charAt(index);
                            index++;
                            this.typingTimer = setTimeout(type, this.typingSpeed);
                        } else if (this.currentPage === 'message') {
                            this.showPhotoWithDelay();
                        }
                    };
                    setTimeout(type, 600);
                },
                showPhotoWithDelay() {
                    setTimeout(() => {
                        if (this.currentPage === 'message') this.photoVisible = true;
                    }, 300);
                },
                playAudio() {
                    if (this.$refs.bgMusic) {
                        this.$refs.bgMusic.play().then(() => this.audioPlaying = true)
                        .catch(() => console.log("ንካ ያስፈልጋል"));
                    }
                },
                toggleAudio() {
                    if (!this.$refs.bgMusic) return;
                    if (this.audioPlaying) { this.$refs.bgMusic.pause(); this.audioPlaying = false; }
                    else { this.$refs.bgMusic.play().then(() => this.audioPlaying = true).catch(() => {}); }
