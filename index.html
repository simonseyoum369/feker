                    setTimeout(() => {
                        const heart = document.createElement('div');
                        heart.className = 'absolute text-rose-400 pointer-events-none animate-float-up';
                        heart.style.left = Math.random() * 80 + 10 + '%';
                        heart.style.top = Math.random() * 60 + 40 + '%';
                        heart.style.fontSize = (Math.random() * 16 + 12) + 'px';

                        this.typedText += this.fullMessage.charAt(index);
                        index++;
                        this.typingTimer = setTimeout(type, this.typingSpeed);

                    }
                };
